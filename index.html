<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Morpion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Morpion</h1>

  <!-- Sélection du mode -->
<div id="mode">
  <button data-mode="pvp">Joueur vs Joueur</button>
  <button data-mode="easy">IA Facile</button>
  <button data-mode="medium">IA Normal</button>
  <button data-mode="hard">IA Impossible</button>

  <br><br>

  <button data-size="3">Grille 3×3</button>
  <button data-size="4">Grille 4×4</button>
  <button data-size="5">Grille 5×5</button>
</div>


  <!-- SCORE -->
  <div id="scores">
    <p>Score X : <span id="scoreX">0</span></p>
    <p>Score O : <span id="scoreO">0</span></p>
    <p>Nuls : <span id="scoreDraw">0</span></p>
  </div>

  <!-- STATUT DU JEU -->
  <p id="status">Tour du joueur X</p>

  <!-- GRILLE -->
  <div class="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <!-- BOUTONS -->
  <button id="reset">Rejouer</button>
  <button id="resetScores">Reset des scores</button>

  <script src="script.js"></script>
</body>
</html>
